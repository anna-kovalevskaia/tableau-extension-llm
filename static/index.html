<!DOCTYPE html>
<html>

<head>
    <title>Tableau LLM Chat</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/tableau.extensions.1.latest.min.js"></script>
    <script type="module" src="/static/js/startExtension.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>📊 Tableau LLM Assistant</h1>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hello! Ask me anything about your dashboard data.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userQuestion" placeholder="Type your question here...">
            <button id="askBtn">Send</button>
        </div>
    </div>

</body>

</html>
